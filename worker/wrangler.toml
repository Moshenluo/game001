# Cloudflare Worker Configuration
name = "rift-of-fate"
main = "index.js"
compatibility_date = "2024-01-01"
workers_dev = true
preview_urls = true

# Custom domain (replaces blocked workers.dev)
routes = [
  { pattern = "api.mingyunliexi.online", custom_domain = true }
]

# KV Namespace binding (create with: wrangler kv:namespace create RIFT_KV)
[[kv_namespaces]]
binding = "RIFT_KV"
id = "9d3f79f2ca6f4be4b035f95350d7cccc"

# API Key — set via CLI: wrangler secret put DEEPSEEK_API_KEY
# NEVER put the key here in plaintext!
[vars]
# AI_MODEL = "deepseek-chat"
